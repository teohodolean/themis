<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FaceLink AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --pink: #ff006e;
    --green: #06ffa5;
    --bg: #04060f;
    --border: rgba(0,245,255,0.2);
  }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100dvh;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(4,6,15,0.88);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  #logo { font-family:'Orbitron',monospace; font-weight:900; font-size:14px; letter-spacing:3px; color:var(--cyan); text-shadow:0 0 20px var(--cyan); }
  #logo span { color: var(--pink); }
  #status { font-size:10px; letter-spacing:2px; display:flex; align-items:center; gap:6px; }
  #status-dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

  #camera-wrap { display:none; position:relative; width:100vw; height:100dvh; }
  #video { width:100%; height:100%; object-fit:cover; }
  #overlay { position:absolute; inset:0; pointer-events:none; }

  #loading {
    position:fixed; inset:0;
    background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:300; gap:20px;
  }
  .ld-title { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; letter-spacing:4px; color:var(--cyan); text-shadow:0 0 20px var(--cyan); }
  #bar-wrap { width:220px; height:3px; background:rgba(0,245,255,0.1); border-radius:2px; overflow:hidden; }
  #bar { height:100%; width:0; background:var(--cyan); box-shadow:0 0 10px var(--cyan); transition:width 0.4s; }
  #load-txt { font-size:10px; letter-spacing:3px; color:rgba(0,245,255,0.5); }

  #start-screen {
    display:none; position:fixed; inset:0; z-index:200;
    flex-direction:column; align-items:center; justify-content:center;
    background:var(--bg); gap:24px; padding:32px;
  }
  .scan-icon { width:90px; height:90px; position:relative; display:flex; align-items:center; justify-content:center; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .scan-icon svg { filter:drop-shadow(0 0 16px var(--cyan)); }
  .cc { position:absolute; width:22px; height:22px; border-color:var(--cyan); border-style:solid; }
  .cc.tl { top:0; left:0; border-width:3px 0 0 3px; }
  .cc.tr { top:0; right:0; border-width:3px 3px 0 0; }
  .cc.bl { bottom:0; left:0; border-width:0 0 3px 3px; }
  .cc.br { bottom:0; right:0; border-width:0 3px 3px 0; }
  #start-screen h1 { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; letter-spacing:4px; color:var(--cyan); text-shadow:0 0 30px var(--cyan); text-align:center; }
  #start-screen p { font-size:12px; letter-spacing:2px; color:rgba(0,245,255,0.5); text-align:center; line-height:1.8; max-width:280px; }
  #start-btn {
    margin-top:8px; padding:14px 36px;
    background:transparent; border:2px solid var(--cyan);
    color:var(--cyan); font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:4px;
    cursor:pointer; text-transform:uppercase;
    box-shadow:0 0 20px rgba(0,245,255,0.2),inset 0 0 20px rgba(0,245,255,0.05);
    transition:background 0.2s;
  }
  #start-btn:active { background:rgba(0,245,255,0.1); }

  #scanline {
    display:none; position:fixed; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    opacity:.35; animation:sweep 4s linear infinite; pointer-events:none; z-index:99;
  }
  @keyframes sweep { 0%{top:0} 100%{top:100%} }

  #no-face {
    display:none; position:fixed; bottom:55px; left:50%; transform:translateX(-50%);
    font-size:11px; letter-spacing:2px; color:rgba(0,245,255,0.45);
    white-space:nowrap; pointer-events:none; z-index:90;
    animation:fp 2s ease-in-out infinite;
  }
  @keyframes fp { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ui-c { display:none; position:fixed; width:36px; height:36px; border-color:rgba(0,245,255,0.25); border-style:solid; pointer-events:none; z-index:50; }
  .ui-c.tl { top:52px; left:8px; border-width:2px 0 0 2px; }
  .ui-c.tr { top:52px; right:8px; border-width:2px 2px 0 0; }
  .ui-c.bl { bottom:8px; left:8px; border-width:0 0 2px 2px; }
  .ui-c.br { bottom:8px; right:8px; border-width:0 2px 2px 0; }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">FACE<span style="color:var(--pink)">LINK</span></div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <p id="load-txt">LOADING AI MODEL...</p>
</div>

<div id="start-screen">
  <div class="scan-icon">
    <div class="cc tl"></div><div class="cc tr"></div>
    <div class="cc bl"></div><div class="cc br"></div>
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="20" r="8" stroke="#00f5ff" stroke-width="2"/>
      <path d="M10 38c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="#00f5ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="20" r="3" fill="#00f5ff" opacity="0.5"/>
    </svg>
  </div>
  <h1>FACE<span style="color:var(--pink)">LINK</span></h1>
  <p>POINT YOUR CAMERA AT A FACE<br>TO REVEAL YOUR DIGITAL CONNECTIONS</p>
  <button id="start-btn" onclick="startCamera()">ACTIVATE CAMERA</button>
</div>

<div id="camera-wrap">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="header">
  <div id="logo">FACE<span>LINK</span></div>
  <div id="status"><div id="status-dot"></div><span id="status-text">SCANNING</span></div>
</div>

<div class="ui-c tl"></div><div class="ui-c tr"></div>
<div class="ui-c bl"></div><div class="ui-c br"></div>
<div id="scanline"></div>
<div id="no-face">[ NO FACE DETECTED — ALIGN CAMERA ]</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// ── ICONS ─────────────────────────────────────────────────────────────────────
const ALL_ICONS = [
  { label:'MESSAGE',   color:'#00f5ff', path:'M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' },
  { label:'INSTAGRAM', color:'#ff006e', path:'M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01M7.8 2h8.4A5.8 5.8 0 0122 7.8v8.4A5.8 5.8 0 0116.2 22H7.8A5.8 5.8 0 012 16.2V7.8A5.8 5.8 0 017.8 2z' },
  { label:'LINKEDIN',  color:'#0ea5e9', path:'M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z' },
  { label:'X/TWITTER', color:'#e2e8f0', path:'M4 4l16 16M4 20L20 4' },
  { label:'TIKTOK',    color:'#ff2d55', path:'M9 12a4 4 0 104 4V4a5 5 0 005 5' },
  { label:'CALL',      color:'#06ffa5', path:'M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 15.72V19a2 2 0 01-2 2A17 17 0 013 5z' },
  { label:'WEBSITE',   color:'#ffbe0b', path:'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9' },
  { label:'NFC SHARE', color:'#a78bfa', path:'M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0' },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let videoEl, canvasEl, ctx;
let activeIcons = [], iconScales = [];
let faceBox = null, targetBox = null;
let arrowProgress = 0;
let detected = false, wasDetected = false;
let confidence = 0; // 0–10 smooth confidence score
let tick = 0;
let modelsReady = false;
let isDetecting = false;

// ── LOADING ───────────────────────────────────────────────────────────────────
const MODEL_BASE = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';

async function loadModels() {
  const bar = document.getElementById('bar');
  const txt = document.getElementById('load-txt');
  try {
    txt.textContent = 'LOADING FACE DETECTOR...';
    bar.style.width = '30%';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_BASE);
    bar.style.width = '100%';
    txt.textContent = 'MODEL READY ✓';
    modelsReady = true;
  } catch(e) {
    txt.textContent = 'CDN FAILED — RETRYING...';
    // Fallback CDN
    try {
      await faceapi.nets.tinyFaceDetector.loadFromUri(
        'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'
      );
      bar.style.width = '100%';
      txt.textContent = 'MODEL READY ✓';
      modelsReady = true;
    } catch(e2) {
      txt.textContent = 'MODEL LOAD FAILED — CHECK NETWORK';
      console.error(e2);
    }
  }
  await new Promise(r => setTimeout(r, 500));
  document.getElementById('loading').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

// Start loading immediately when face-api.js is available
(function waitForFaceApi() {
  if (typeof faceapi !== 'undefined') {
    loadModels();
  } else {
    setTimeout(waitForFaceApi, 50);
  }
})();

// ── CAMERA ────────────────────────────────────────────────────────────────────
let isFrontCamera = false;

async function startCamera() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('camera-wrap').style.display = 'block';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('scanline').style.display = 'block';
  document.querySelectorAll('.ui-c').forEach(el => el.style.display = 'block');

  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('overlay');
  ctx = canvasEl.getContext('2d');

  let stream;
  // Try rear camera first (phones), then front/any camera (laptops)
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    isFrontCamera = false;
  } catch {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      // Check if we got a front/user camera
      const track = stream.getVideoTracks()[0];
      const settings = track.getSettings();
      isFrontCamera = !settings.facingMode || settings.facingMode === 'user';
    } catch {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        isFrontCamera = true;
      } catch(e) {
        alert('Camera not accessible. Allow camera permissions and reload.');
        return;
      }
    }
  }

  // Mirror video display for front camera (selfie mirror effect)
  videoEl.style.transform = isFrontCamera ? 'scaleX(-1)' : 'none';

  videoEl.srcObject = stream;
  await new Promise(r => videoEl.onloadedmetadata = r);
  await new Promise(r => videoEl.onloadeddata = r);

  // Force canvas size from window, not from element (which may be 0 if layout glitches)
  canvasEl.width  = window.innerWidth;
  canvasEl.height = window.innerHeight;

  setInterval(runDetection, 120);
  requestAnimationFrame(renderLoop);
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  canvasEl.width  = window.innerWidth;
  canvasEl.height = window.innerHeight;
}

// ── ICON PICK ─────────────────────────────────────────────────────────────────
function pickIcons() {
  const count = 4 + Math.floor(Math.random() * 5);
  activeIcons = [...ALL_ICONS].sort(() => Math.random() - 0.5).slice(0, count);
  iconScales = activeIcons.map(() => 0);
}

// ── FACE DETECTION ────────────────────────────────────────────────────────────
async function runDetection() {
  if (!modelsReady || !videoEl || videoEl.readyState < 2 || isDetecting) return;
  isDetecting = true;
  try {
    const det = await faceapi.detectSingleFace(
      videoEl,
      new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.3 })
    );
    if (det) {
      const vw = videoEl.videoWidth,  vh = videoEl.videoHeight;
      const cw = canvasEl.width,       ch = canvasEl.height;
      const scale   = Math.max(cw / vw, ch / vh);
      const offsetX = (cw - vw * scale) / 2;
      const offsetY = (ch - vh * scale) / 2;
      const b = det.box;
      let x = b.x * scale + offsetX;
      // Mirror X for front camera (video is CSS-flipped so detection coords need flipping too)
      if (isFrontCamera) x = cw - x - b.width * scale;
      targetBox = { x, y: b.y * scale + offsetY, w: b.width * scale, h: b.height * scale };
      confidence = Math.min(confidence + 2, 10);
    } else {
      confidence = Math.max(confidence - 1, 0);
      if (confidence === 0) targetBox = null;
    }
  } catch(e) { /* ignore */ }
  isDetecting = false;
}

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function renderLoop() {
  tick++;
  const W = canvasEl.width, H = canvasEl.height;
  ctx.clearRect(0, 0, W, H);

  // Detected when confidence is high enough (reduces flickering)
  detected = confidence >= 4;

  if (detected && !wasDetected) { pickIcons(); arrowProgress = 0; }
  wasDetected = detected;

  // Update HUD
  const dot = document.getElementById('status-dot');
  document.getElementById('status-text').textContent = detected ? 'FACE LOCKED' : 'SCANNING';
  dot.style.background = detected ? '#06ffa5' : '#00f5ff';
  dot.style.boxShadow  = detected ? '0 0 8px #06ffa5' : '0 0 8px #00f5ff';
  document.getElementById('no-face').style.display = detected ? 'none' : 'block';

  if (detected && targetBox) {
    if (!faceBox) faceBox = { ...targetBox };
    faceBox.x += (targetBox.x - faceBox.x) * 0.18;
    faceBox.y += (targetBox.y - faceBox.y) * 0.18;
    faceBox.w += (targetBox.w - faceBox.w) * 0.18;
    faceBox.h += (targetBox.h - faceBox.h) * 0.18;
    arrowProgress = Math.min(arrowProgress + 0.022, 1);
    drawAR(W, H);
  } else {
    arrowProgress = Math.max(arrowProgress - 0.035, 0);
    if (faceBox && arrowProgress > 0) drawAR(W, H);
    else faceBox = null;
  }

  requestAnimationFrame(renderLoop);
}

// ── AR OVERLAY ────────────────────────────────────────────────────────────────
function drawAR(W, H) {
  const b   = faceBox;
  const cx  = b.x + b.w / 2;
  const cy  = b.y + b.h / 2;
  const ap  = arrowProgress;
  const pad = 14;
  const bx = b.x - pad, by = b.y - pad, bw = b.w + pad*2, bh = b.h + pad*2;
  const CL  = 26; // corner length

  ctx.save();
  ctx.globalAlpha = ap;

  // ── Bracket corners ──
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 14;
  [
    [bx,    by,    CL,  0,  0,  CL],
    [bx+bw, by,   -CL,  0,  0,  CL],
    [bx,    by+bh, CL,  0,  0, -CL],
    [bx+bw, by+bh,-CL,  0,  0, -CL],
  ].forEach(([x, y, dx, dy, ex, ey]) => {
    ctx.beginPath();
    ctx.moveTo(x+dx, y+dy); ctx.lineTo(x, y); ctx.lineTo(x+ex, y+ey);
    ctx.stroke();
  });

  // ── Dashed rect ──
  ctx.setLineDash([5,9]); ctx.strokeStyle='rgba(0,245,255,0.18)';
  ctx.shadowBlur=0; ctx.lineWidth=1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.setLineDash([]);

  // ── Scan sweep ──
  const sy = by + (tick * 2) % bh;
  const sg = ctx.createLinearGradient(0, sy-22, 0, sy+4);
  sg.addColorStop(0,'rgba(0,245,255,0)');
  sg.addColorStop(1,'rgba(0,245,255,0.12)');
  ctx.fillStyle = sg; ctx.shadowBlur = 0;
  ctx.fillRect(bx, Math.max(by, sy-22), bw, Math.min(26, sy-by+22));

  // ── Crosshair ──
  ctx.strokeStyle='rgba(0,245,255,0.32)'; ctx.lineWidth=1; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(cx-13,cy); ctx.lineTo(cx+13,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-13); ctx.lineTo(cx,cy+13); ctx.stroke();

  // ── Icons + arrows ──
  const n = activeIcons.length;
  const R = Math.min(W, H) * 0.40;
  const IS = 27;
  const edge = Math.max(bw, bh) / 2 + pad + 6;

  activeIcons.forEach((icon, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const ix = cx + Math.cos(angle) * R;
    const iy = cy + Math.sin(angle) * R;
    const ex = cx + Math.cos(angle) * edge;
    const ey = cy + Math.sin(angle) * edge;
    const px = ex + (ix - ex) * ap;
    const py = ey + (iy - ey) * ap;

    // Arrow line
    ctx.save();
    ctx.globalAlpha = ap * 0.85;
    ctx.strokeStyle = icon.color;
    ctx.lineWidth = 1.8;
    ctx.shadowColor = icon.color; ctx.shadowBlur = 8;
    ctx.setLineDash([5,8]); ctx.lineDashOffset = -(tick * 1.8);
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(px,py); ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    if (ap > 0.5) {
      const t = Math.min((ap-0.5)/0.5, 1);
      ctx.globalAlpha = ap * t;
      ctx.fillStyle = icon.color; ctx.shadowBlur = 10;
      const ang = Math.atan2(iy-ey, ix-ex);
      ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-4.5,5); ctx.lineTo(-4.5,-5);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
    ctx.restore();

    // Icon bubble
    if (ap > 0.65) {
      const t = Math.min((ap-0.65)/0.35, 1);
      iconScales[i] = Math.min(iconScales[i] + 0.1, 1);
      ctx.save();
      ctx.translate(ix, iy);
      ctx.scale(iconScales[i], iconScales[i]);
      ctx.globalAlpha = t;

      // Glow halo
      const grd = ctx.createRadialGradient(0,0,0,0,0,IS+10);
      grd.addColorStop(0, hexA(icon.color, 0.25));
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0,0,IS+10,0,Math.PI*2); ctx.fill();

      // Circle fill + stroke
      ctx.fillStyle   = hexA(icon.color, 0.1);
      ctx.strokeStyle = icon.color;
      ctx.lineWidth   = 1.8;
      ctx.shadowColor = icon.color; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(0,0,IS,0,Math.PI*2); ctx.fill(); ctx.stroke();

      // SVG icon path
      ctx.strokeStyle = icon.color; ctx.lineWidth = 2; ctx.shadowBlur = 7;
      ctx.save(); ctx.translate(-11,-11); ctx.scale(22/24, 22/24);
      ctx.stroke(new Path2D(icon.path)); ctx.restore();

      // Label
      ctx.fillStyle = icon.color;
      ctx.font = 'bold 8px "Share Tech Mono",monospace';
      ctx.textAlign = 'center'; ctx.shadowBlur = 5;
      ctx.fillText(icon.label, 0, IS+15);

      ctx.restore();
    }
  });

  ctx.restore();
}

// ── UTIL ─────────────────────────────────────────────────────────────────────
function hexA(hex, a) {
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;
}
</script>
</body>
</html>
