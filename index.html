<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FaceLink AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --pink: #ff006e;
    --yellow: #ffbe0b;
    --green: #06ffa5;
    --bg: #04060f;
    --panel: rgba(0,245,255,0.05);
    --border: rgba(0,245,255,0.2);
  }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(4,6,15,0.85);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  #logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan);
  }

  #logo span { color: var(--pink); }

  #status {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  #camera-container {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    gap: 24px;
    padding: 32px;
  }

  .scan-icon {
    width: 90px; height: 90px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .scan-icon svg { filter: drop-shadow(0 0 16px var(--cyan)); }

  .corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--cyan);
    border-style: solid;
  }
  .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  #start-screen h1 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan);
    text-align: center;
  }

  #start-screen p {
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(0,245,255,0.5);
    text-align: center;
    line-height: 1.8;
    max-width: 280px;
  }

  #start-btn {
    margin-top: 8px;
    padding: 14px 36px;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
  }

  #start-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
    transition: left 0.4s;
  }

  #start-btn:hover::before, #start-btn:active::before { left: 100%; }
  #start-btn:active { background: rgba(0,245,255,0.1); transform: scale(0.97); }

  #no-face-msg {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(0,245,255,0.4);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  #no-face-msg.show { opacity: 1; }

  /* Scanline effect */
  #scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
    animation: scanline 4s linear infinite;
    pointer-events: none;
    z-index: 300;
  }
  @keyframes scanline {
    0% { top: 0; }
    100% { top: 100%; }
  }

  /* Corner overlays */
  .ui-corner {
    position: fixed;
    width: 40px; height: 40px;
    border-color: rgba(0,245,255,0.3);
    border-style: solid;
    pointer-events: none;
    z-index: 50;
  }
  .ui-corner.tl { top: 55px; left: 8px; border-width: 2px 0 0 2px; }
  .ui-corner.tr { top: 55px; right: 8px; border-width: 2px 2px 0 0; }
  .ui-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .ui-corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 250;
    gap: 20px;
  }
  #loading-bar-wrap {
    width: 200px; height: 3px;
    background: rgba(0,245,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: load 2s ease forwards;
    width: 0;
  }
  @keyframes load { to { width: 100%; } }
  #loading p { font-size: 10px; letter-spacing: 3px; color: rgba(0,245,255,0.5); }
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px var(--cyan);letter-spacing:4px;">FACE<span style="color:var(--pink)">LINK</span></div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <p id="loading-text">INITIALIZING...</p>
</div>

<div id="start-screen" style="display:none;">
  <div class="scan-icon">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="20" r="8" stroke="#00f5ff" stroke-width="2"/>
      <path d="M10 38c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="#00f5ff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="20" r="3" fill="#00f5ff" opacity="0.5"/>
    </svg>
  </div>
  <h1>FACE<span style="color:var(--pink)">LINK</span></h1>
  <p>POINT YOUR CAMERA AT A FACE<br>TO REVEAL YOUR DIGITAL CONNECTIONS</p>
  <button id="start-btn" onclick="startCamera()">ACTIVATE CAMERA</button>
</div>

<div id="camera-container" style="display:none;">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="header" style="display:none;">
  <div id="logo">FACE<span>LINK</span></div>
  <div id="status"><div id="status-dot"></div><span id="status-text">SCANNING</span></div>
</div>

<div class="ui-corner tl" id="uc-tl" style="display:none;"></div>
<div class="ui-corner tr" id="uc-tr" style="display:none;"></div>
<div class="ui-corner bl" id="uc-bl" style="display:none;"></div>
<div class="ui-corner br" id="uc-br" style="display:none;"></div>

<div id="scanline" style="display:none;"></div>
<div id="no-face-msg">[ NO FACE DETECTED — ALIGN CAMERA ]</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const ALL_ICONS = [
  { id:'msg',   label:'MESSAGE',   color:'#00f5ff', path:'M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' },
  { id:'insta', label:'INSTAGRAM', color:'#ff006e', path:'M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01M7.8 2h8.4A5.8 5.8 0 0122 7.8v8.4A5.8 5.8 0 0116.2 22H7.8A5.8 5.8 0 012 16.2V7.8A5.8 5.8 0 017.8 2z' },
  { id:'link',  label:'LINKEDIN',  color:'#0ea5e9', path:'M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 6a2 2 0 100-4 2 2 0 000 4z' },
  { id:'x',     label:'X/TWITTER', color:'#e2e8f0', path:'M4 4l16 16M4 20L20 4' },
  { id:'tiktok',label:'TIKTOK',    color:'#ff006e', path:'M9 12a4 4 0 104 4V4a5 5 0 005 5' },
  { id:'phone', label:'CALL',      color:'#06ffa5', path:'M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498A1 1 0 0121 15.72V19a2 2 0 01-2 2A17 17 0 013 5z' },
  { id:'web',   label:'WEBSITE',   color:'#ffbe0b', path:'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9' },
  { id:'nfc',   label:'NFC SHARE', color:'#a78bfa', path:'M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0' },
];

let videoEl, canvasEl, ctx, detector, animId;
let faceBox = null, targetBox = null;
let activeIcons = [];
let iconAnims = [];
let arrowProgress = 0;
let noFaceTimer = null;

// ─── LOADING ─────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const loadingText = document.getElementById('loading-text');
  const steps = ['LOADING MODELS...','CALIBRATING...','READY'];
  for (let i = 0; i < steps.length; i++) {
    await delay(600);
    loadingText.textContent = steps[i];
  }
  await delay(400);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
});

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── CAMERA START ─────────────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('camera-container').style.display = 'block';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('scanline').style.display = 'block';
  ['uc-tl','uc-tr','uc-bl','uc-br'].forEach(id => document.getElementById(id).style.display = 'block');

  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('overlay');
  ctx = canvasEl.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      resizeCanvas();
      pickIcons();
      requestAnimationFrame(detectLoop);
    };
  } catch (e) {
    alert('Camera access denied. Please allow camera permissions and reload.');
  }

  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  canvasEl.width = canvasEl.offsetWidth;
  canvasEl.height = canvasEl.offsetHeight;
}

// ─── ICON SELECTION ───────────────────────────────────────────────────────────
function pickIcons() {
  const count = 4 + Math.floor(Math.random() * 5); // 4–8
  const shuffled = [...ALL_ICONS].sort(() => Math.random() - 0.5);
  activeIcons = shuffled.slice(0, count);
  iconAnims = activeIcons.map(() => ({ scale: 0, glow: 0 }));
}

// ─── FACE DETECTION ───────────────────────────────────────────────────────────
let faceDetector;
async function initDetector() {
  if ('FaceDetector' in window) {
    faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
    return true;
  }
  return false;
}

let detectorReady = false;
initDetector().then(r => detectorReady = r);

// Fallback: simple canvas-based "movement presence" detection for unsupported browsers
// We'll use the FaceDetector API where available, fallback to center-screen placeholder
let lastImageData = null;
let motionScore = 0;

async function detectFace() {
  if (!videoEl || videoEl.readyState < 2) return null;
  const W = canvasEl.width, H = canvasEl.height;

  if (detectorReady && faceDetector) {
    try {
      const faces = await faceDetector.detect(videoEl);
      if (faces.length > 0) {
        const f = faces[0].boundingBox;
        // mirror x because video is CSS-flipped
        const scaleX = W / videoEl.videoWidth;
        const scaleY = H / videoEl.videoHeight;
        const mirroredX = W - (f.x + f.width) * scaleX;
        return {
          x: mirroredX, y: f.y * scaleY,
          w: f.width * scaleX, h: f.height * scaleY
        };
      }
      return null;
    } catch { return null; }
  }

  // Fallback: motion detection heuristic
  const offscreen = document.createElement('canvas');
  offscreen.width = 40; offscreen.height = 30;
  const oc = offscreen.getContext('2d');
  oc.drawImage(videoEl, 0, 0, 40, 30);
  const data = oc.getImageData(0, 0, 40, 30).data;
  if (lastImageData) {
    let diff = 0;
    for (let i = 0; i < data.length; i += 16) diff += Math.abs(data[i] - lastImageData[i]);
    motionScore = motionScore * 0.8 + (diff / (data.length / 16)) * 0.2;
  }
  lastImageData = data;

  if (motionScore > 5) {
    // Put a face box in roughly center-ish area
    return { x: W * 0.25, y: H * 0.15, w: W * 0.5, h: H * 0.55 };
  }
  return null;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let tick = 0;
let detected = false;
let detectedFrames = 0;

async function detectLoop() {
  tick++;
  const W = canvasEl.width, H = canvasEl.height;
  ctx.clearRect(0, 0, W, H);

  // Detect every 3 frames
  if (tick % 3 === 0) {
    const box = await detectFace();
    if (box) {
      targetBox = box;
      detectedFrames = Math.min(detectedFrames + 1, 10);
    } else {
      detectedFrames = Math.max(detectedFrames - 1, 0);
      if (detectedFrames === 0) targetBox = null;
    }
  }

  detected = detectedFrames >= 3;

  // Update status
  document.getElementById('status-text').textContent = detected ? 'FACE LOCKED' : 'SCANNING';
  document.getElementById('status-dot').style.background = detected ? '#06ffa5' : '#00f5ff';
  document.getElementById('status-dot').style.boxShadow = detected ? '0 0 8px #06ffa5' : '0 0 8px #00f5ff';

  // No-face message
  const noFaceEl = document.getElementById('no-face-msg');
  if (!detected) {
    noFaceEl.classList.add('show');
  } else {
    noFaceEl.classList.remove('show');
  }

  if (detected && targetBox) {
    // Smooth lerp
    if (!faceBox) faceBox = { ...targetBox };
    faceBox.x += (targetBox.x - faceBox.x) * 0.15;
    faceBox.y += (targetBox.y - faceBox.y) * 0.15;
    faceBox.w += (targetBox.w - faceBox.w) * 0.15;
    faceBox.h += (targetBox.h - faceBox.h) * 0.15;

    arrowProgress = Math.min(arrowProgress + 0.025, 1);
    drawFaceUI(W, H);
  } else {
    arrowProgress = Math.max(arrowProgress - 0.05, 0);
    if (faceBox && arrowProgress > 0) drawFaceUI(W, H);
    else faceBox = null;
  }

  requestAnimationFrame(detectLoop);
}

// ─── DRAWING ─────────────────────────────────────────────────────────────────
function drawFaceUI(W, H) {
  const b = faceBox;
  const cx = b.x + b.w / 2;
  const cy = b.y + b.h / 2;
  const alpha = arrowProgress;

  ctx.save();
  ctx.globalAlpha = alpha;

  // ── Face box ──
  const pad = 12;
  const bx = b.x - pad, by = b.y - pad, bw = b.w + pad * 2, bh = b.h + pad * 2;
  const cLen = 22;

  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 12;

  // Corners
  const corners = [
    [bx, by, cLen, 0, cLen, 0],
    [bx + bw, by, -cLen, 0, cLen, 0],
    [bx, by + bh, cLen, 0, -cLen, 0],
    [bx + bw, by + bh, -cLen, 0, -cLen, 0],
  ];
  corners.forEach(([x, y, dx1, dy1, dx2, dy2]) => {
    ctx.beginPath();
    ctx.moveTo(x + dx1, y); ctx.lineTo(x, y); ctx.lineTo(x, y + (dy2 || dx2 > 0 ? Math.abs(dy2 || 0) || cLen : -cLen));
    ctx.stroke();
  });

  // Dashed border
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = 'rgba(0,245,255,0.25)';
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.setLineDash([]);

  // Center crosshair
  ctx.strokeStyle = 'rgba(0,245,255,0.4)';
  ctx.lineWidth = 1;
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10); ctx.stroke();

  // ── Scan line animation ──
  const scanY = by + ((tick * 2) % bh);
  const sg = ctx.createLinearGradient(bx, scanY - 20, bx, scanY + 5);
  sg.addColorStop(0, 'rgba(0,245,255,0)');
  sg.addColorStop(1, 'rgba(0,245,255,0.15)');
  ctx.fillStyle = sg;
  ctx.fillRect(bx, Math.max(by, scanY - 20), bw, Math.min(25, scanY - by + 20));

  // ── ICONS + ARROWS ──
  const n = activeIcons.length;
  const iconR = Math.min(W, H) * 0.38;
  const iconSize = 26;

  activeIcons.forEach((icon, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const ix = cx + Math.cos(angle) * iconR;
    const iy = cy + Math.sin(angle) * iconR;

    // Arrow from face edge to icon
    const edgePad = Math.max(bw, bh) / 2 + pad + 10;
    const ex = cx + Math.cos(angle) * edgePad;
    const ey = cy + Math.sin(angle) * edgePad;

    const px = ex + (ix - ex) * arrowProgress;
    const py = ey + (iy - ey) * arrowProgress;

    // Animated dashed arrow
    ctx.save();
    ctx.strokeStyle = icon.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = icon.color;
    ctx.shadowBlur = 8;
    ctx.globalAlpha = alpha * 0.8;
    ctx.setLineDash([5, 7]);
    ctx.lineDashOffset = -(tick * 1.5);
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(px, py);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    if (arrowProgress > 0.6) {
      const ah = 8;
      const headAlpha = (arrowProgress - 0.6) / 0.4;
      ctx.globalAlpha = alpha * headAlpha;
      ctx.fillStyle = icon.color;
      ctx.shadowColor = icon.color;
      ctx.shadowBlur = 10;
      const headAng = Math.atan2(iy - ey, ix - ex);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(headAng);
      ctx.beginPath();
      ctx.moveTo(ah, 0);
      ctx.lineTo(-ah / 2, ah / 2);
      ctx.lineTo(-ah / 2, -ah / 2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();

    // Icon circle + symbol
    if (arrowProgress > 0.75) {
      const iconAlpha = (arrowProgress - 0.75) / 0.25;
      const scaleAnim = Math.min(iconAnims[i].scale + 0.08, 1);
      iconAnims[i].scale = scaleAnim;

      ctx.save();
      ctx.translate(ix, iy);
      ctx.scale(scaleAnim * iconAlpha, scaleAnim * iconAlpha);
      ctx.globalAlpha = alpha * iconAlpha;

      // Glow circle
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, iconSize + 6);
      grad.addColorStop(0, hexAlpha(icon.color, 0.3));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(0, 0, iconSize + 6, 0, Math.PI * 2); ctx.fill();

      // Circle border
      ctx.strokeStyle = icon.color;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = icon.color;
      ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.arc(0, 0, iconSize, 0, Math.PI * 2); ctx.stroke();

      // Fill
      ctx.fillStyle = hexAlpha(icon.color, 0.12);
      ctx.fill();

      // SVG path icon (drawn as 2D path)
      ctx.strokeStyle = icon.color;
      ctx.lineWidth = 1.8;
      ctx.shadowBlur = 8;
      ctx.globalAlpha = alpha * iconAlpha;
      drawSVGPath(ctx, icon.path, -10, -10, 20, 20);

      // Label
      ctx.fillStyle = icon.color;
      ctx.font = `bold 8px 'Share Tech Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.shadowBlur = 6;
      ctx.fillText(icon.label, 0, iconSize + 14);

      ctx.restore();
    }
  });

  ctx.restore();
}

// ─── DRAW SVG PATH ───────────────────────────────────────────────────────────
function drawSVGPath(ctx, pathData, x, y, w, h) {
  // Parse and scale a simple SVG path for icon rendering
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(w / 24, h / 24);
  const p = new Path2D(pathData);
  ctx.stroke(p);
  ctx.restore();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
